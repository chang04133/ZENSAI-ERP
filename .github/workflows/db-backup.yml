name: Database Backup

on:
  schedule:
    - cron: '0 18 * * *' # 매일 오전 3시 KST (UTC 18:00)
  workflow_dispatch: # 수동 실행 버튼

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          DATE=$(date +%Y%m%d)
          MONTH=$(date +%Y%m)
          DAY_OF_MONTH=$(date +%d)

          pg_dump "$DATABASE_URL" \
            --format=custom \
            --no-owner \
            --no-privileges \
            --file=zensai_erp_${TIMESTAMP}.dump

          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "MONTH=$MONTH" >> $GITHUB_ENV
          echo "DAY_OF_MONTH=$DAY_OF_MONTH" >> $GITHUB_ENV

          FILE_SIZE=$(ls -lh *.dump | awk '{print $5}')
          echo "DUMP_FILE=zensai_erp_${TIMESTAMP}.dump" >> $GITHUB_ENV
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "✅ Backup created: zensai_erp_${TIMESTAMP}.dump ($FILE_SIZE)"

      # --- GitHub Artifact (빠른 접근용, 30일) ---
      - name: Upload to GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.TIMESTAMP }}
          path: "*.dump"
          retention-days: 30

      # --- Supabase Storage (일별 30일 + 월별 3년) ---
      - name: Upload daily backup to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "📤 Uploading daily backup..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "${SUPABASE_URL}/storage/v1/object/db-backups/daily/zensai_erp_${DATE}.dump" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            --data-binary @"${DUMP_FILE}")

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Daily backup uploaded (HTTP $HTTP_CODE)"
          else
            echo "❌ Daily upload failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Upload monthly snapshot to Supabase
        if: env.DAY_OF_MONTH == '01'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "📤 Uploading monthly snapshot..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "${SUPABASE_URL}/storage/v1/object/db-backups/monthly/zensai_erp_${MONTH}.dump" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            --data-binary @"${DUMP_FILE}")

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ Monthly snapshot uploaded (HTTP $HTTP_CODE)"
          else
            echo "❌ Monthly upload failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      # --- 오래된 백업 정리 ---
      - name: Cleanup old daily backups (30일 초과)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🧹 Cleaning up daily backups older than 30 days..."
          CUTOFF_DATE=$(date -d '30 days ago' +%Y%m%d)

          # daily 폴더의 파일 목록 조회
          FILES=$(curl -s \
            -X POST \
            "${SUPABASE_URL}/storage/v1/object/list/db-backups" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"prefix":"daily/","limit":100}')

          # 30일 초과 파일 필터링 및 삭제
          OLD_FILES=$(echo "$FILES" | \
            python3 -c "
          import json, sys
          files = json.load(sys.stdin)
          cutoff = '${CUTOFF_DATE}'
          to_delete = []
          for f in files:
              name = f.get('name', '')
              # zensai_erp_YYYYMMDD.dump 형식에서 날짜 추출
              parts = name.replace('zensai_erp_', '').replace('.dump', '')
              if parts.isdigit() and parts < cutoff:
                  to_delete.append('daily/' + name)
          print(json.dumps(to_delete))
          ")

          if [ "$OLD_FILES" != "[]" ] && [ -n "$OLD_FILES" ]; then
            echo "Deleting old files: $OLD_FILES"
            curl -s \
              -X DELETE \
              "${SUPABASE_URL}/storage/v1/object/db-backups" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"prefixes\": $OLD_FILES}"
            echo "✅ Old daily backups cleaned up"
          else
            echo "ℹ️ No old daily backups to clean up"
          fi

      - name: Cleanup old monthly backups (3년 초과)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🧹 Cleaning up monthly backups older than 3 years..."
          CUTOFF_MONTH=$(date -d '36 months ago' +%Y%m)

          FILES=$(curl -s \
            -X POST \
            "${SUPABASE_URL}/storage/v1/object/list/db-backups" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"prefix":"monthly/","limit":100}')

          OLD_FILES=$(echo "$FILES" | \
            python3 -c "
          import json, sys
          files = json.load(sys.stdin)
          cutoff = '${CUTOFF_MONTH}'
          to_delete = []
          for f in files:
              name = f.get('name', '')
              parts = name.replace('zensai_erp_', '').replace('.dump', '')
              if parts.isdigit() and parts < cutoff:
                  to_delete.append('monthly/' + name)
          print(json.dumps(to_delete))
          ")

          if [ "$OLD_FILES" != "[]" ] && [ -n "$OLD_FILES" ]; then
            echo "Deleting old files: $OLD_FILES"
            curl -s \
              -X DELETE \
              "${SUPABASE_URL}/storage/v1/object/db-backups" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"prefixes\": $OLD_FILES}"
            echo "✅ Old monthly backups cleaned up"
          else
            echo "ℹ️ No old monthly backups to clean up"
          fi

      # --- 결과 요약 ---
      - name: Backup summary
        run: |
          echo "========================================="
          echo "  📦 ZENSAI ERP Backup Summary"
          echo "========================================="
          echo "  File: ${DUMP_FILE}"
          echo "  Size: ${FILE_SIZE}"
          echo "  Date: ${DATE}"
          echo ""
          echo "  📁 GitHub Artifact: ✅ (30일 보관)"
          echo "  📁 Supabase daily/: ✅ (30일 보관)"
          if [ "${DAY_OF_MONTH}" = "01" ]; then
            echo "  📁 Supabase monthly/: ✅ (3년 보관)"
          fi
          echo "========================================="
